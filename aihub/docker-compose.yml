version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: aihub
      POSTGRES_PASSWORD: aihub_secret
      POSTGRES_DB: aihub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aihub"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "4200:3000"
    environment:
      DATABASE_URL: postgresql://aihub:aihub_secret@postgres:5432/aihub
      NEXTAUTH_SECRET: change_this_to_a_random_secret_string
      NEXTAUTH_URL: http://localhost:4200
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
